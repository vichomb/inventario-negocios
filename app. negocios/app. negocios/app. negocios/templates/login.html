<!DOCTYPE html>
<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Ingreso</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow mx-auto" style="max-width:500px;">

<div class="card-header bg-primary text-white">
<h3>Ingreso al Inventario</h3>
</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">
<input
type="text"
name="nombre"
class="form-control"
placeholder="Nombre"
required>
</div>

<div class="mb-3">
<input
type="text"
name="rut"
class="form-control"
placeholder="RUT"
required>
</div>

<button class="btn btn-success w-100">
Entrar
</button>

</form>

</div>

</div>

</div>

</body>
</html>
