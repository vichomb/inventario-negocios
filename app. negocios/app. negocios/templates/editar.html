<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">

<title>Editar Producto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning">
<h2>Editar Producto</h2>
</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">
Nombre
</label>

<input
type="text"
name="nombre"
value="{{ producto.nombre }}"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Precio
</label>

<input
type="number"
step="0.01"
name="precio"
value="{{ producto.precio }}"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Stock
</label>

<input
type="number"
name="stock"
value="{{ producto.stock }}"
class="form-control"
required>

</div>

<button class="btn btn-success">
Guardar Cambios
</button>

<a href="/" class="btn btn-secondary">
Volver
</a>

</form>

</div>

</div>

</div>

</body>
</html>
